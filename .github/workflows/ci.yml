name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Tests rely on these envs being set; provide deterministic defaults so
      # config.loadConfig() doesn't throw during module init in test runners.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/contritas_test
      REDIS_URL: redis://localhost:6379
      LLM_PROVIDER: claude
      ANTHROPIC_API_KEY: dummy-ci-key
      TAVILY_API_KEY: dummy-ci-key
      API_AUTH_TOKEN: dummy-ci-token
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_API_TOKEN: dummy-ci-token
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

  docker-build:
    name: docker build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-test-build

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: contritas/api:ci

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: contritas/web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
            NEXT_PUBLIC_API_TOKEN=dummy-ci-token
