name: Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changesets-release
  cancel-in-progress: false

jobs:
  release-pr:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When the main branch has unconsumed changesets, this opens / updates a
      # "chore: release" PR that bumps versions and consumes the .changeset/
      # files. Merging that PR pushes git tags, which trigger release.yml.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset tag
          title: "chore: release"
          commit: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
