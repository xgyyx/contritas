name: Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changesets-release
  cancel-in-progress: false

jobs:
  release-pr:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When the main branch has unconsumed changesets, this opens / updates a
      # "chore: release" PR that bumps versions and consumes the .changeset/
      # files. Merging that PR causes a second run where hasChangesets=false,
      # at which point the next step pushes a unified vX.Y.Z tag to trigger
      # release.yml.
      #
      # Uses RELEASE_PAT (classic PAT, scopes: repo + workflow) so that
      # pushed commits/tags can trigger downstream workflows — the default
      # GITHUB_TOKEN is blocked from triggering other workflows by design,
      # so a tag pushed with it would NOT fire release.yml. We previously
      # tried a fine-grained PAT and observed the same non-triggering
      # behavior; classic PAT with repo + workflow is the combination that
      # actually fans out to release.yml. See docs/deployment/release.md
      # §六 for the rationale.
      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm changeset version
          # Intentionally NOT setting `publish:` — `pnpm changeset tag` would
          # emit per-package tags like `@contritas/api@0.6.0` (or nothing at
          # all, since all packages are private with `privatePackages.tag:
          # false`). Neither matches release.yml's `v*.*.*` trigger. We push
          # a single repo-wide tag in the next step instead.
          title: "chore: release"
          commit: "chore: release"
          # The root CHANGELOG.md is hand-maintained in Chinese (keepachangelog
          # style). Per-package CHANGELOG.md files are auto-generated in
          # English by changesets — we keep both. release.yml (tag-triggered)
          # creates the GitHub Release from the root CHANGELOG.md, so disable
          # action's built-in release creation to avoid duplicate Releases.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      # Runs only on the post-merge invocation: hasChangesets becomes 'false'
      # once the release PR is merged and .changeset/*.md have been consumed.
      # Reads apps/api/package.json — `changeset version` bumps the workspace
      # packages but NOT the root package.json (which is a private monorepo
      # container, not a workspace member). The `fixed` group in
      # .changeset/config.json keeps all 6 workspace packages on the same
      # version, so reading any one of them is fine; apps/api is the natural
      # source of truth for the release version. Pushes a single `vX.Y.Z`
      # tag, which release.yml picks up.
      - name: Push unified vX.Y.Z tag
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/api/package.json').version")
          TAG="v$VERSION"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally, skipping"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG"
