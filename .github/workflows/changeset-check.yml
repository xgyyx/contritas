name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: PR has changeset
    runs-on: ubuntu-latest
    # The Release PR opened by changesets/action consumes all changesets by
    # design, so it cannot satisfy the "must have a changeset" rule. Skip
    # the gate for that branch + author combo (defense-in-depth: both must
    # match before we skip).
    if: >-
      !(
        github.head_ref == 'changeset-release/main'
        && github.event.pull_request.user.login == 'github-actions[bot]'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `changeset status --since=origin/main` exits 1 when there are no
      # changesets relative to base. PRs that intentionally skip versioning
      # (docs-only, internal refactor) should commit an empty changeset:
      #   `pnpm changeset --empty`
      - name: Verify changeset present
        run: pnpm changeset status --since=origin/main
