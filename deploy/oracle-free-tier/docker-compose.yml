## Contritas — Oracle Cloud Always Free (ARM Ampere A1) 部署
##
## 与根目录 docker-compose.prod.yml 的差异：
## 1. 不本地 build，直接拉 GHCR multi-arch 镜像（含 arm64）
## 2. 显式声明 platform: linux/arm64，避免误拉 amd64 + QEMU 模拟
## 3. api/web 不再暴露端口，由 Caddy 反代 + 自动 TLS 统一入口
## 4. Redis 开 appendonly，防 VPS 重启丢 BullMQ 任务和 SSE event stream
## 5. WEB_ORIGIN 直接拼自 ${DOMAIN}，与 Caddy TLS 域名保持一致
##
## 使用：见同目录 README.md 与 docs/deployment/oracle-free-tier.md

services:
  postgres:
    image: postgres:16
    platform: linux/arm64
    environment:
      POSTGRES_DB: contritas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/xgyyx/contritas-api:${APP_VERSION:?APP_VERSION must be set}
    platform: linux/arm64
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/contritas
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      LLM_MODEL_CHEAP: ${LLM_MODEL_CHEAP:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:?API_AUTH_TOKEN must be set}
      WEB_ORIGIN: https://app.${DOMAIN:?DOMAIN must be set}
      RATE_LIMIT_IP_PER_MIN: ${RATE_LIMIT_IP_PER_MIN:-60}
      RATE_LIMIT_CREATE_PER_HOUR: ${RATE_LIMIT_CREATE_PER_HOUR:-10}
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    image: ghcr.io/xgyyx/contritas-api:${APP_VERSION}
    platform: linux/arm64
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/contritas
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      LLM_MODEL_CHEAP: ${LLM_MODEL_CHEAP:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 5m
    restart: unless-stopped

  web:
    image: ghcr.io/xgyyx/contritas-web:${APP_VERSION}
    platform: linux/arm64
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    platform: linux/arm64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
